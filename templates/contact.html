<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <title>تماس با ما</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container justify-content-center">
            <div class="navbar-nav">
                <a class="nav-link " href="{{ url_for('home') }}">خانه</a>
                <a class="nav-link " href="{{url_for('list_blog')}}">وبلاگ</a>
                <a class="nav-link" href="{{ url_for('about') }}">درباره ما</a>
                <a class="nav-link active" href="{{ url_for('contact') }}">تماس</a>
            </div>
        </div>
    </nav>
    <div class="">
    {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {%for category, messag in messages %}

                    <div class="m-4 alert alert-{{category}} alert-dismissible fade show" role="alert">
                        <strong>{{category}}</strong> {{messag}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    
                {% endfor %}
            {% endif %}
    {% endwith %}
    </div>
    <div class="container">
        <div  class="row justify-content-center">
            <form method="post" class="col-md-6 bg-white p-4 rounded shadow-sm">
                <h3 class="mb-4 text-center">ارسال پیام</h3>
                <div class="mb-3">
                    <input type="text" name="fulname" class="form-control" placeholder="نام و نام خانوادگی">
                </div>
                <input type="submit" class="btn btn-dark w-100">
            </form>
        </div>
    </div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
